apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pure-flask
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Albertycl/lab_gitops.git
    targetRevision: master
    path: pure-flask
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

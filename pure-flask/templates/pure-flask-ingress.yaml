apiVersion: networking.k8s.io/v1 # K8s API version, Ingress belongs to networking.k8s.io
kind: Ingress # Resource type: Ingress
metadata: # Identity and extra info about this resource
  name: pure-flask-ingress # Name of this Ingress (shown in kubectl get ingress)
  namespace: default # Which namespace (must match where the Service lives)
  annotations: # Extra config hints for the Ingress Controller
    traefik.ingress.kubernetes.io/router.entrypoints: web # Tell Traefik to use the web entrypoint (HTTP port 80)
spec: # Resource specification
  ingressClassName: traefik # Which Ingress Controller handles this
  rules: # Routing rules
  - host: pureflask.localhost # When request host matches pureflask.localhost, apply this rule
    http: # HTTP routing config
      paths: # Path matching rules
      - backend: # Where to forward traffic to
          service: # Target Service
            name: pure-flask # Service name (must match kubectl get svc exactly)
            port: # Service port
              number: 5001 # Maps to pure-flask Service port 5001
        path: / # Match all paths
        pathType: Prefix # Prefix means match anything starting with /

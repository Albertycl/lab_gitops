apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Albertycl/lab_gitops.git  # your actual config repo on GitHub
    targetRevision: master                                  # your branch name
    path: task-manager                                      # path to Helm chart in repo
  destination:
    server: https://kubernetes.default.svc  # deploy to THIS cluster
    namespace: default
  syncPolicy:
    automated:                            # auto-sync when Git changes
      prune: true                         # delete resources removed from Git
      selfHeal: true                      # revert manual cluster changes (drift detection)